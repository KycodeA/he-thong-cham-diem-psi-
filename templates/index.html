<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống PSI - GPS Live</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f8f9fa; }
        #map { height: 500px; width: 100%; border-radius: 8px; border: 2px solid #dee2e6; }
        .control-panel { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .btn-live { width: 100%; font-weight: bold; margin-bottom: 10px; }
        #loading { display: none; color: #e67e22; font-weight: bold; text-align: center; margin-top: 10px;}
    </style>
</head>
<body>
<div class="container mt-4">
    <h2 class="text-center text-primary mb-4">🎯 Ứng dụng Chấm điểm PSI - Tracking Live</h2>
    
    <div class="row">
        <div class="col-md-5">
            <div class="control-panel">
                <h5 class="text-success">🛰️ Quản lý Hành trình GPS</h5>
                <button id="startBtn" class="btn btn-success btn-live">📍 Bắt đầu Hành trình (Tracking Live)</button>
                <button id="stopBtn" class="btn btn-danger btn-live" style="display: none;">🔴 Kết thúc & Chốt tọa độ</button>
                <p id="gps-status" class="text-muted text-center small mt-2">Trạng thái: Đang chờ lệnh...</p>
                <hr>

                <h5 class="text-info mt-3">📋 Khai báo Kỹ thuật</h5>
                <form id="psiForm">
                    <div class="mb-2">
                        <label>Tên Sinh viên:</label>
                        <input type="text" id="ten_sv" class="form-control" placeholder="Ví dụ: Nguyễn Văn A" required>
                    </div>
                    <div class="mb-2">
                        <label>Mã đoạn đường:</label>
                        <input type="text" id="ma_doan" class="form-control" placeholder="Ví dụ: 1_BTXM_1" required>
                    </div>
                    <div class="mb-2">
                        <label>Loại kết cấu:</label>
                        <select id="loai_duong" class="form-select">
                            <option value="nhua">Đường nhựa (Mặt đường mềm)</option>
                            <option value="btxm">Đường BTXM (Mặt đường cứng)</option>
                        </select>
                    </div>
                    <div class="mb-2">
                        <label>Upload Ảnh khảo sát (AI quét):</label>
                        <input type="file" id="media_files" class="form-control" multiple accept=".png, .jpg, .jpeg">
                    </div>
                    <div class="row mb-2">
                        <div class="col"><label>% Nứt (C):</label><input type="number" id="c_param" class="form-control" value="0.0" step="0.1"></div>
                        <div class="col"><label>% Vá (P):</label><input type="number" id="p_param" class="form-control" value="0.0" step="0.1"></div>
                    </div>
                    <div class="row mb-3">
                        <div class="col"><label>Gồ ghề (SV):</label><input type="number" id="sv_param" class="form-control" value="0.0" step="0.1"></div>
                        <div class="col"><label>Lún (RD):</label><input type="number" id="rd_param" class="form-control" value="0.0" step="0.1"></div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 fw-bold">🚀 Đẩy dữ liệu lên Google Sheets</button>
                    <div id="loading">⏳ Server đang phân tích AI & đồng bộ dữ liệu...</div>
                </form>
            </div>
        </div>

        <div class="col-md-7">
            <div id="map"></div>
            <div id="result-panel" class="control-panel mt-3" style="display: none;">
                <h4 class="text-center text-success">🎉 Đồng bộ Thành công!</h4>
                <div id="result-content" class="mt-3"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // Khởi tạo bản đồ mặc định tại khu vực trường GTVT Hà Nội
    var map = L.map('map').setView([21.0274, 105.8046], 15);
    L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', { maxZoom: 20 }).addTo(map);

    var userMarker = null, routeLine = null, routeCoordinates = [], watchId = null;

    // Kích hoạt tính năng bắt GPS liên tục bằng Javascript thuần của trình duyệt
    document.getElementById('startBtn').addEventListener('click', function() {
        if (!navigator.geolocation) { alert("Thiết bị không hỗ trợ GPS!"); return; }
        
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('stopBtn').style.display = 'block';
        document.getElementById('gps-status').innerText = "📡 Hệ thống đang theo dõi Live... Hãy di chuyển!";
        document.getElementById('gps-status').className = "text-success text-center small mt-2 fw-bold";
        routeCoordinates = []; 

        watchId = navigator.geolocation.watchPosition(function(position) {
            var lat = position.coords.latitude;
            var lon = position.coords.longitude;
            var currentPos = [lat, lon];
            routeCoordinates.push(currentPos);

            // Tự cập nhật chấm xanh di chuyển mượt mà trên bản đồ
            if (!userMarker) {
                userMarker = L.circleMarker(currentPos, {radius: 8, fillColor: "#0066FF", color: "#ffffff", weight: 3, opacity: 1, fillOpacity: 1}).addTo(map);
                map.setView(currentPos, 17);
            } else {
                userMarker.setLatLng(currentPos);
                map.panTo(currentPos);
            }

            // Tự nối dây màu đỏ sau gót chân người khảo sát
            if (!routeLine) {
                routeLine = L.polyline(routeCoordinates, {color: 'red', weight: 5, opacity: 0.8}).addTo(map);
            } else {
                routeLine.setLatLngs(routeCoordinates);
            }
        }, function(error) {
            alert("Lỗi GPS: Vui lòng bật vị trí chính xác trên điện thoại!");
        }, { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 });
    });

    document.getElementById('stopBtn').addEventListener('click', function() {
        navigator.geolocation.clearWatch(watchId); 
        document.getElementById('stopBtn').style.display = 'none';
        document.getElementById('startBtn').style.display = 'block';
        document.getElementById('gps-status').innerText = `✅ Đã chốt lộ trình (${routeCoordinates.length} mốc).`;
    });

    // Đóng gói mảng tọa độ + hình ảnh khảo sát bắn thẳng lên Server Flask
    document.getElementById('psiForm').addEventListener('submit', function(e) {
        e.preventDefault();
        if (routeCoordinates.length < 2) { alert("Chưa có dữ liệu GPS di chuyển!"); return; }

        document.getElementById('loading').style.display = 'block';
        var formData = new FormData();
        formData.append('ten_sv', document.getElementById('ten_sv').value);
        formData.append('ma_doan', document.getElementById('ma_doan').value);
        formData.append('loai_duong', document.getElementById('loai_duong').value);
        formData.append('c_param', document.getElementById('c_param').value);
        formData.append('p_param', document.getElementById('p_param').value);
        formData.append('sv_param', document.getElementById('sv_param').value);
        formData.append('rd_param', document.getElementById('rd_param').value);
        formData.append('route_data', JSON.stringify(routeCoordinates));

        var files = document.getElementById('media_files').files;
        for (var i = 0; i < files.length; i++) { formData.append('files[]', files[i]); }

        fetch('/process_data', { method: 'POST', body: formData })
        .then(response => response.json())
        .then(data => {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('result-panel').style.display = 'block';
            
            if (data.status === "success") {
                document.getElementById('result-content').innerHTML = `
                    <p><b>Tổng quãng đường bám phố:</b> ${data.tong_quang_duong_m} m</p>
                    <p><b>Trạng thái lộ trình:</b> ${data.dung_lo_trinh ? 'Hợp lệ' : 'Quá giới hạn'}</p>
                    <p><b>AI quét thấy:</b> ${data.ai_o_ga_count} Ổ gà</p>
                    <h3><b>Điểm PSI: <span class="text-danger">${data.psi_score} / 5.0</span></b></h3>
                    <div class="alert alert-success">🚀 Số liệu đã tự động chèn vào file Google Sheets tập trung!</div>
                `;
                if(routeLine) map.removeLayer(routeLine);
                L.polyline(data.osrm_route, {color: '#0066FF', weight: 6}).addTo(map);
            } else {
                alert("Lỗi: " + data.message);
            }
        });
    });
</script>
</body>
</html>
